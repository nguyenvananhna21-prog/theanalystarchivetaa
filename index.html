<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Inspired Square Carousel - 12 Vietnam Landmarks</title>
    <style>
        :root {
            --apple-easing: cubic-bezier(0.25, 1, 0.5, 1);
            --duration: 0.75s; /* Thời gian trượt 0.75s */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0b0c;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* Container tổng hỗ trợ Auto Resize & Responsive */
        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 520px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            user-select: none;
            overflow: visible;
        }

        .carousel-container:active {
            cursor: grabbing;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* Khung ảnh vuông 1:1 có Layer, Shadow, Depth */
        .slide {
            position: absolute;
            width: 340px; 
            height: 340px; /* Định dạng hình vuông 1:1 */
            border-radius: 28px;
            overflow: hidden;
            transform-style: preserve-3d;
            will-change: transform, filter, opacity;
            transition: transform var(--duration) var(--apple-easing), 
                        filter var(--duration) var(--apple-easing), 
                        opacity var(--duration) var(--apple-easing),
                        box-shadow var(--duration) var(--apple-easing);
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0);
        }

        /* Lớp nền mờ khuếch tán phía sau tạo Depth (Background blur hiệu ứng Apple) */
        .slide-blur-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(24px);
            opacity: 0;
            transform: scale(0.9) translateZ(-20px);
            transition: opacity var(--duration) var(--apple-easing);
            z-index: 0;
            pointer-events: none;
        }

        .slide.active .slide-blur-bg {
            opacity: 0.4;
        }

        /* Layer hình ảnh chính chất lượng cao */
        .slide-media {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 28px;
            z-index: 1;
            pointer-events: none;
        }

        /* Lớp phủ shadow/overlay nhẹ tạo chiều sâu khối viền ảnh */
        .slide::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 28px;
            z-index: 2;
            transition: background var(--duration) var(--apple-easing);
            pointer-events: none;
        }

        .slide.active::after {
            background: rgba(0, 0, 0, 0); /* Ảnh trung tâm sáng nét hoàn toàn */
        }

        /* ---- ĐỊNH HÌNH KHÔNG GIAN 3D & CHỒNG LỚP OVERLAP 35% ---- */

        /* Ảnh trung tâm [Hiển thị to nhất, đổ bóng sâu] */
        .slide.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) translateZ(220px) scale(1.15);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.75), 0 10px 20px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        /* Lớp bên phải 1 (Đè lên ảnh chính khoảng 35%) */
        .slide.next-1 {
            opacity: 0.88;
            pointer-events: auto;
            transform: translateX(200px) translateZ(60px) scale(0.88);
            filter: blur(1px);
            z-index: 5;
        }

        /* Lớp bên phải 2 (Rìa xa bên phải) */
        .slide.next-2 {
            opacity: 0.45;
            transform: translateX(380px) translateZ(-60px) scale(0.68);
            filter: blur(4px);
            z-index: 3;
        }

        /* Lớp bên trái 1 */
        .slide.prev-1 {
            opacity: 0.88;
            pointer-events: auto;
            transform: translateX(-200px) translateZ(60px) scale(0.88);
            filter: blur(1px);
            z-index: 5;
        }

        /* Lớp bên trái 2 */
        .slide.prev-2 {
            opacity: 0.45;
            transform: translateX(-380px) translateZ(-60px) scale(0.68);
            filter: blur(4px);
            z-index: 3;
        }

        /* Ẩn các ảnh còn lại trong vòng lặp */
        .slide.hidden {
            opacity: 0;
            transform: translateX(0) translateZ(-200px) scale(0.5);
            z-index: 1;
        }

        /* Responsive Mobile & Tablet */
        @media (max-width: 768px) {
            .carousel-container { height: 400px; }
            .slide { width: 230px; height: 230px; }
            .slide.active { transform: translateX(0) translateZ(100px) scale(1.1); }
            .slide.next-1 { transform: translateX(130px) translateZ(30px) scale(0.85); filter: blur(0.5px); }
            .slide.prev-1 { transform: translateX(-130px) translateZ(30px) scale(0.85); filter: blur(0.5px); }
            .slide.next-2, .slide.prev-2 { opacity: 0; transform: translateX(0) translateZ(-100px); }
        }
    </style>
</head>
<body>

    <div class="carousel-container" id="carousel">
        <div class="carousel-track" id="track">
            <!-- 1: Vịnh Hạ Long -->
            <div class="slide" data-index="0">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=600&h=600&q=80" alt="Vịnh Hạ Long">
            </div>
            <!-- 2: Phố cổ Hội An -->
            <div class="slide" data-index="1">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=600&h=600&q=80" alt="Hội An">
            </div>
            <!-- 3: Cầu Vàng Đà Nẵng -->
            <div class="slide" data-index="2">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=600&h=600&q=80" alt="Cầu Vàng">
            </div>
            <!-- 4: Hoàng thành Thăng Long -->
            <div class="slide" data-index="3">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1599708153386-62e2ff062a4d?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1599708153386-62e2ff062a4d?auto=format&fit=crop&w=600&h=600&q=80" alt="Hoàng thành Thăng Long">
            </div>
            <!-- 5: Chùa Một Cột -->
            <div class="slide" data-index="4">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1629986386343-4cb50bb91823?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1629986386343-4cb50bb91823?auto=format&fit=crop&w=600&h=600&q=80" alt="Chùa Một Cột">
            </div>
            <!-- 6: Cố đô Huế -->
            <div class="slide" data-index="5">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1605538032432-a9f0c8d9baac?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1605538032432-a9f0c8d9baac?auto=format&fit=crop&w=600&h=600&q=80" alt="Cố đô Huế">
            </div>
            <!-- 7: Ruộng bậc thang Mù Cang Chải -->
            <div class="slide" data-index="6">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1608958416712-42dbba04e908?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1608958416712-42dbba04e908?auto=format&fit=crop&w=600&h=600&q=80" alt="Ruộng bậc thang Mù Cang Chải">
            </div>
            <!-- 8: Hang Sơn Đoòng (Quảng Bình) -->
            <div class="slide" data-index="7">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1618083707368-b3823daa2726?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1618083707368-b3823daa2726?auto=format&fit=crop&w=600&h=600&q=80" alt="Hang Sơn Đoòng">
            </div>
            <!-- 9: Tam Cốc – Tràng An -->
            <div class="slide" data-index="8">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1569154941061-e231b4725ef1?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1569154941061-e231b4725ef1?auto=format&fit=crop&w=600&h=600&q=80" alt="Tam Cốc Tràng An">
            </div>
            <!-- 10: Hồ Gươm Hà Nội -->
            <div class="slide" data-index="9">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1583417319070-4a69db38a482?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1583417319070-4a69db38a482?auto=format&fit=crop&w=600&h=600&q=80" alt="Hồ Gươm">
            </div>
            <!-- 11: Dinh Độc Lập -->
            <div class="slide" data-index="10">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1623864197931-482813135db7?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1623864197931-482813135db7?auto=format&fit=crop&w=600&h=600&q=80" alt="Dinh Độc Lập">
            </div>
            <!-- 12: Chợ Bến Thành -->
            <div class="slide" data-index="11">
                <div class="slide-blur-bg" style="background-image: url('https://images.unsplash.com/photo-1553556006-258cdb8c0a87?auto=format&fit=crop&w=600&h=600&q=80');"></div>
                <img class="slide-media" data-src="https://images.unsplash.com/photo-1553556006-258cdb8c0a87?auto=format&fit=crop&w=600&h=600&q=80" alt="Chợ Bến Thành">
            </div>
        </div>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const slides = Array.from(document.querySelectorAll('.slide'));
        const totalSlides = slides.length;
        
        let currentIndex = 4; // Bắt đầu tiêu điểm tại ảnh thứ 5 (index 4) làm trung tâm mặc định
        let isDragging = false;
        let startX = 0;
        let currentTranslate = 0;
        let autoPlayTimer = null;

        // --- HÀM LAZY LOADING TỰ ĐỘNG KÍCH HOẠT ---
        function lazyLoadImages() {
            slides.forEach(slide => {
                const img = slide.querySelector('.slide-media');
                if (img && img.getAttribute('data-src') && !img.src) {
                    img.src = img.getAttribute('data-src');
                }
            });
        }

        // --- CƠ CHẾ VÒNG LẶP VÔ HẠN (INFINITE LOOP 12 ẢNH) ---
        function updateCarousel() {
            slides.forEach((slide, i) => {
                let offset = i - currentIndex;
                
                // Giải thuật cuộn toán học vòng tròn vô hạn định
                if (offset < -totalSlides / 2) offset += totalSlides;
                if (offset > totalSlides / 2) offset -= totalSlides;

                slide.className = 'slide';

                // Phân phối trạng thái hiển thị 5 ảnh đồng thời 3D
                if (offset === 0) {
                    slide.classList.add('active');
                } else if (offset === 1) {
                    slide.classList.add('next-1');
                } else if (offset === 2) {
                    slide.classList.add('next-2');
                } else if (offset === -1) {
                    slide.classList.add('prev-1');
                } else if (offset === -2) {
                    slide.classList.add('prev-2');
                } else {
                    slide.classList.add('hidden');
                }
            });
        }

        // --- HÀM TRƯỢT SANG PHẢI / TRÁI ---
        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            updateCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            updateCarousel();
        }

        // --- CƠ CHẾ TỰ ĐỘNG CHUYỂN ẢNH (2S HIỆN TẠI + 0.75S TRƯỢT = 2750MS) ---
        function startAutoPlay() {
            stopAutoPlay();
            autoPlayTimer = setInterval(() => {
                nextSlide();
            }, 2750);
        }

        function stopAutoPlay() {
            if (autoPlayTimer) clearInterval(autoPlayTimer);
        }

        // --- MOUSE DRAG & TOUCH SWIPE (KÉO CHUỘT / VUỐT CẢM ỨNG) ---
        function handleStart(e) {
            stopAutoPlay();
            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        }

        function handleMove(e) {
            if (!isDragging) return;
            const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
            currentTranslate = currentX - startX;
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            if (currentTranslate < -40) {
                nextSlide();
            } else if (currentTranslate > 40) {
                prevSlide();
            }
            currentTranslate = 0;
            startAutoPlay();
        }

        // --- SCROLL ANIMATION (CUỘN BÁNH XE CHUỘT) ---
        let lastWheelTime = 0;
        function handleWheel(e) {
            e.preventDefault();
            const now = performance.now();
            if (now - lastWheelTime < 750) return; // Khóa hành vi cuộn dồn dập duy trì FPS mượt

            stopAutoPlay();
            if (e.deltaY > 0 || e.deltaX > 0) {
                nextSlide();
            } else {
                prevSlide();
            }
            lastWheelTime = now;
            startAutoPlay();
        }

        // Đăng ký sự kiện
        carousel.addEventListener('mousedown', handleStart);
        carousel.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        carousel.addEventListener('touchstart', handleStart);
        carousel.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);

        carousel.addEventListener('wheel', handleWheel, { passive: false });

        // Cho phép click nhanh vào ảnh vệ tinh hai bên để nhảy tiêu điểm trực tiếp
        slides.forEach(slide => {
            slide.addEventListener('click', () => {
                stopAutoPlay();
                currentIndex = parseInt(slide.getAttribute('data-index'));
                updateCarousel();
                startAutoPlay();
            });
        });

        // Khởi động toàn diện hệ thống
        lazyLoadImages();
        updateCarousel();
        startAutoPlay();
    </script>
</body>
</html>
