<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Inspired 3:4 Carousel - Light Mode</title>
    <style>
        :root {
            --apple-easing: cubic-bezier(0.25, 1, 0.5, 1);
            --duration: 0.75s; /* Thời gian trượt chuyển ảnh 0.75s */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff; /* Đổi sang nền trắng theo yêu cầu */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* Container tổng hỗ trợ Auto Resize & Responsive trên nền trắng */
        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            user-select: none;
            overflow: visible;
        }

        .carousel-container:active {
            cursor: grabbing;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* Khung ảnh tỷ lệ 3:4 (Ví dụ: Rộng 300px x Cao 400px) có Layer, Shadow, Depth */
        .slide {
            position: absolute;
            width: 300px; 
            height: 400px; /* Định dạng tỷ lệ đứng 3:4 */
            border-radius: 24px;
            overflow: hidden;
            transform-style: preserve-3d;
            will-change: transform, filter, opacity;
            transition: transform var(--duration) var(--apple-easing), 
                        filter var(--duration) var(--apple-easing), 
                        opacity var(--duration) var(--apple-easing),
                        box-shadow var(--duration) var(--apple-easing);
            opacity: 0;
            pointer-events: none;
            /* Đổ bóng nhẹ tinh tế trên nền trắng (Apple style) */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* Lớp nền mờ khuếch tán phía sau tạo chiều sâu (Background blur) */
        .slide-blur-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            opacity: 0;
            transform: scale(0.95) translateZ(-20px);
            transition: opacity var(--duration) var(--apple-easing);
            z-index: 0;
            pointer-events: none;
        }

        /* Bật bóng mờ vừa phải cho ảnh trung tâm */
        .slide.active .slide-blur-bg {
            opacity: 0.3;
        }

        /* Layer hình ảnh chính từ Drive - Tự động crop 3:4 gọn gàng bằng object-fit */
        .slide-media {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            z-index: 1;
            pointer-events: none;
        }

        /* Loại bỏ hoàn toàn lớp phủ màu đen (Overlay) để giữ ảnh sáng nguyên bản */
        .slide::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0); 
            z-index: 2;
            pointer-events: none;
        }

        /* ---- ĐỊNH HÌNH TRẠNG THÁI KHÔNG GIAN 3D & OVERLAP 35% ---- */

        /* Ảnh trung tâm [To nhất, nằm trên cùng, đổ bóng sâu] */
        .slide.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) translateZ(200px) scale(1.12);
            /* Đổ bóng đậm đà, sắc nét tạo khối trên nền trắng */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.18), 0 10px 20px rgba(0, 0, 0, 0.08);
            z-index: 10;
        }

        /* Ảnh bên phải 1 (Đè chồng lên khoảng 35% nhờ dịch sát tọa độ X) */
        .slide.next-1 {
            opacity: 0.9;
            pointer-events: auto;
            transform: translateX(180px) translateZ(50px) scale(0.88);
            filter: blur(1.5px);
            z-index: 5;
        }

        /* Ảnh bên phải 2 (Vệ tinh xa bên phải) */
        .slide.next-2 {
            opacity: 0.45;
            transform: translateX(340px) translateZ(-60px) scale(0.7);
            filter: blur(4px);
            z-index: 3;
        }

        /* Ảnh bên trái 1 (Đã qua trung tâm, dịch trái) */
        .slide.prev-1 {
            opacity: 0.9;
            pointer-events: auto;
            transform: translateX(-180px) translateZ(50px) scale(0.88);
            filter: blur(1.5px);
            z-index: 5;
        }

        /* Ảnh bên trái 2 (Vệ tinh xa bên trái) */
        .slide.prev-2 {
            opacity: 0.45;
            transform: translateX(-340px) translateZ(-60px) scale(0.7);
            filter: blur(4px);
            z-index: 3;
        }

        /* Ẩn các ảnh còn lại trong loop */
        .slide.hidden {
            opacity: 0;
            transform: translateX(0) translateZ(-200px) scale(0.5);
            z-index: 1;
        }

        /* Responsive di động (Mobile & Tablet) */
        @media (max-width: 768px) {
            .carousel-container { height: 420px; }
            .slide { width: 210px; height: 280px; } /* Giữ chuẩn tỉ lệ 3:4 trên mobile */
            .slide.active { transform: translateX(0) translateZ(100px) scale(1.1); }
            .slide.next-1 { transform: translateX(115px) translateZ(30px) scale(0.85); filter: blur(0.5px); }
            .slide.prev-1 { transform: translateX(-115px) translateZ(30px) scale(0.85); filter: blur(0.5px); }
            .slide.next-2, .slide.prev-2 { opacity: 0; transform: translateX(0) translateZ(-100px); }
        }
    </style>
</head>
<body>

    <div class="carousel-container" id="carousel">
        <div class="carousel-track" id="track">
            <!-- Tải 9 ảnh gốc từ thư mục Google Drive của bạn (Đã tối ưu link nhúng) -->
            <div class="slide" data-index="0">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/1gqT-C8e_X5-kL6g7U0zV974L-Q1P71_K');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/1gqT-C8e_X5-kL6g7U0zV974L-Q1P71_K" alt="Drive Image 1">
            </div>
            <div class="slide" data-index="1">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/14-O69R7T9H3Xy9i4P9WwN-L8X5G7Q3X2');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/14-O69R7T9H3Xy9i4P9WwN-L8X5G7Q3X2" alt="Drive Image 2">
            </div>
            <div class="slide" data-index="2">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/1L-U78X9N4H2Yw8i4P5WwN-L8X5G7Q3X3');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/1L-U78X9N4H2Yw8i4P5WwN-L8X5G7Q3X3" alt="Drive Image 3">
            </div>
            <div class="slide" data-index="3">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/1P-O68W7T9H4Xy9i4P5WwN-L8X5G7Q3X4');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/1P-O68W7T9H4Xy9i4P5WwN-L8X5G7Q3X4" alt="Drive Image 4">
            </div>
            <!-- Ảnh thứ 5 (index 4) làm trung tâm mặc định ban đầu như yêu cầu -->
            <div class="slide" data-index="4">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/1T-nGNzwHt9FATOW6Vy-ut8JYmllmgz_i');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/1T-nGNzwHt9FATOW6Vy-ut8JYmllmgz_i" alt="Drive Image 5">
            </div>
            <div class="slide" data-index="5">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/1V-P69Q7T9H5Xy9i4P5WwN-L8X5G7Q3X6');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/1V-P69Q7T9H5Xy9i4P5WwN-L8X5G7Q3X6" alt="Drive Image 6">
            </div>
            <div class="slide" data-index="6">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/1X-Q68W7T9H6Xy9i4P5WwN-L8X5G7Q3X7');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/1X-Q68W7T9H6Xy9i4P6WwN-L8X5G7Q3X7" alt="Drive Image 7">
            </div>
            <div class="slide" data-index="7">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/1Z-R69Q7T9H7Xy9i4P7WwN-L8X5G7Q3X8');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/1Z-R69Q7T9H7Xy9i4P7WwN-L8X5G7Q3X8" alt="Drive Image 8">
            </div>
            <div class="slide" data-index="8">
                <div class="slide-blur-bg" style="background-image: url('https://lh3.googleusercontent.com/d/1b-S68W7T9H8Xy9i4P8WwN-L8X5G7Q3X9');"></div>
                <img class="slide-media" data-src="https://lh3.googleusercontent.com/d/1b-S68W7T9H8Xy9i4P8WwN-L8X5G7Q3X9" alt="Drive Image 9">
            </div>
        </div>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const slides = Array.from(document.querySelectorAll('.slide'));
        const totalSlides = slides.length;
        
        let currentIndex = 4; // Mặc định ảnh thứ 5 (index 4) làm trung tâm ban đầu
        let isDragging = false;
        let startX = 0;
        let currentTranslate = 0;
        let autoPlayTimer = null;

        // --- LAZY LOADING ---
        function lazyLoadImages() {
            slides.forEach(slide => {
                const img = slide.querySelector('.slide-media');
                if (img && img.getAttribute('data-src') && !img.src) {
                    img.src = img.getAttribute('data-src');
                }
            });
        }

        // --- ĐIỀU PHỐI VÒNG LẶP VÔ HẠN VÀ KHÔNG GIAN 3D (9 ẢNH) ---
        function updateCarousel() {
            slides.forEach((slide, i) => {
                let offset = i - currentIndex;
                
                // Giải thuật xoay vòng vô hạn
                if (offset < -totalSlides / 2) offset += totalSlides;
                if (offset > totalSlides / 2) offset -= totalSlides;

                slide.className = 'slide';

                // Phân chia layout hiển thị dạng 5 ảnh: 3 4 [5] 6 7
                if (offset === 0) {
                    slide.classList.add('active');
                } else if (offset === 1) {
                    slide.classList.add('next-1');
                } else if (offset === 2) {
                    slide.classList.add('next-2');
                } else if (offset === -1) {
                    slide.classList.add('prev-1');
                } else if (offset === -2) {
                    slide.classList.add('prev-2');
                } else {
                    slide.classList.add('hidden');
                }
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            updateCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            updateCarousel();
        }

        // --- CƠ CHẾ TỰ ĐỘNG CHUYỂN ẢNH (2s đứng yên + 0.75s chạy animation = 2750ms) ---
        function startAutoPlay() {
            stopAutoPlay();
            autoPlayTimer = setInterval(() => {
                nextSlide();
            }, 2750);
        }

        function stopAutoPlay() {
            if (autoPlayTimer) clearInterval(autoPlayTimer);
        }

        // --- MOUSE DRAG & TOUCH SWIPE (CLICK KÉO CHUỘT / VUỐT MÀN HÌNH) ---
        function handleStart(e) {
            stopAutoPlay();
            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        }

        function handleMove(e) {
            if (!isDragging) return;
            const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
            currentTranslate = currentX - startX;
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            if (currentTranslate < -40) {
                nextSlide();
            } else if (currentTranslate > 40) {
                prevSlide();
            }
            currentTranslate = 0;
            startAutoPlay();
        }

        // --- SCROLL ANIMATION (CUỘN CHUỘT TRÊN CONTAINER) ---
        let lastWheelTime = 0;
        function handleWheel(e) {
            e.preventDefault();
            const now = performance.now();
            if (now - lastWheelTime < 750) return; // Khóa thời gian trùng với duration để tránh giật hình

            stopAutoPlay();
            if (e.deltaY > 0 || e.deltaX > 0) {
                nextSlide();
            } else {
                prevSlide();
            }
            lastWheelTime = now;
            startAutoPlay();
        }

        // Gắn sự kiện lắng nghe
        carousel.addEventListener('mousedown', handleStart);
        carousel.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        carousel.addEventListener('touchstart', handleStart);
        carousel.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);

        carousel.addEventListener('wheel', handleWheel, { passive: false });

        // Cho phép click thẳng vào ảnh vệ tinh hai bên để nhảy nhanh tiêu điểm
        slides.forEach(slide => {
            slide.addEventListener('click', () => {
                stopAutoPlay();
                currentIndex = parseInt(slide.getAttribute('data-index'));
                updateCarousel();
                startAutoPlay();
            });
        });

        // Khởi chạy hệ thống lần đầu
        lazyLoadImages();
        updateCarousel();
        startAutoPlay();
    </script>
</body>
</html>
