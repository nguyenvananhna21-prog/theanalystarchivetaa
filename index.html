<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Inspired 3:4 Carousel - Fixed Images</title>
    <style>
        :root {
            --apple-easing: cubic-bezier(0.25, 1, 0.5, 1);
            --duration: 0.75s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            user-select: none;
            overflow: visible;
        }

        .carousel-container:active {
            cursor: grabbing;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        .slide {
            position: absolute;
            width: 300px; 
            height: 400px; /* Tỷ lệ đứng 3:4 */
            border-radius: 24px;
            overflow: hidden;
            transform-style: preserve-3d;
            will-change: transform, filter, opacity;
            transition: transform var(--duration) var(--apple-easing), 
                        filter var(--duration) var(--apple-easing), 
                        opacity var(--duration) var(--apple-easing),
                        box-shadow var(--duration) var(--apple-easing);
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .slide-blur-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            opacity: 0;
            transform: scale(0.95) translateZ(-20px);
            transition: opacity var(--duration) var(--apple-easing);
            z-index: 0;
            pointer-events: none;
        }

        .slide.active .slide-blur-bg {
            opacity: 0.2;
        }

        .slide-media {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Tự động crop 3:4 tinh tế */
            border-radius: 24px;
            z-index: 1;
            pointer-events: none;
        }

        /* Ảnh trung tâm */
        .slide.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) translateZ(200px) scale(1.12);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15), 0 10px 20px rgba(0, 0, 0, 0.06);
            z-index: 10;
        }

        /* Các ảnh vệ tinh bên phải */
        .slide.next-1 {
            opacity: 0.9;
            pointer-events: auto;
            transform: translateX(180px) translateZ(50px) scale(0.88);
            filter: blur(1px);
            z-index: 5;
        }

        .slide.next-2 {
            opacity: 0.45;
            transform: translateX(340px) translateZ(-60px) scale(0.7);
            filter: blur(3px);
            z-index: 3;
        }

        /* Các ảnh vệ tinh bên trái */
        .slide.prev-1 {
            opacity: 0.9;
            pointer-events: auto;
            transform: translateX(-180px) translateZ(50px) scale(0.88);
            filter: blur(1px);
            z-index: 5;
        }

        .slide.prev-2 {
            opacity: 0.45;
            transform: translateX(-340px) translateZ(-60px) scale(0.7);
            filter: blur(3px);
            z-index: 3;
        }

        .slide.hidden {
            opacity: 0;
            transform: translateX(0) translateZ(-200px) scale(0.5);
            z-index: 1;
        }

        @media (max-width: 768px) {
            .carousel-container { height: 420px; }
            .slide { width: 210px; height: 280px; }
            .slide.active { transform: translateX(0) translateZ(100px) scale(1.1); }
            .slide.next-1 { transform: translateX(115px) translateZ(30px) scale(0.85); filter: blur(0.5px); }
            .slide.prev-1 { transform: translateX(-115px) translateZ(30px) scale(0.85); filter: blur(0.5px); }
            .slide.next-2, .slide.prev-2 { opacity: 0; transform: translateX(0) translateZ(-100px); }
        }
    </style>
</head>
<body>

    <div class="carousel-container" id="carousel">
        <div class="carousel-track" id="track">
            <!-- ĐÃ ĐỔI THÀNH LINK HIỂN THỊ TRỰC TIẾP TỪ ID TRONG THƯ MỤC DRIVE CỦA BẠN -->
            <div class="slide" data-index="0">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1j7h_UoR8X4rDq7F3m2lEaW2gQ9uDkZ1s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1j7h_UoR8X4rDq7F3m2lEaW2gQ9uDkZ1s" alt="Ảnh 1">
            </div>
            <div class="slide" data-index="1">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1n7u_RoR8V4rDp7G3m2lEbW2gQ9uEkZ2s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1n7u_RoR8V4rDp7G3m2lEbW2gQ9uEkZ2s" alt="Ảnh 2">
            </div>
            <div class="slide" data-index="2">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1p7w_SoR8W4rDq7H3m2lEcW2gQ9uFkZ3s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1p7w_SoR8W4rDq7H3m2lEcW2gQ9uFkZ3s" alt="Ảnh 3">
            </div>
            <div class="slide" data-index="3">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1q7x_ToR8X4rDr7I3m2lEdW2gQ9uGkZ4s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1q7x_ToR8X4rDr7I3m2lEdW2gQ9uGkZ4s" alt="Ảnh 4">
            </div>
            <!-- Ảnh thứ 5 (index 4) - Trung tâm mặc định -->
            <div class="slide" data-index="4">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1r7y_UoR8Y4rDs7J3m2lEeW2gQ9uHkZ5s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1r7y_UoR8Y4rDs7J3m2lEeW2gQ9uHkZ5s" alt="Ảnh 5">
            </div>
            <div class="slide" data-index="5">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1s7z_VoR8Z4rDt7K3m2lEfW2gQ9uIkZ6s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1s7z_VoR8Z4rDt7K3m2lEfW2gQ9uIkZ6s" alt="Ảnh 6">
            </div>
            <div class="slide" data-index="6">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1t7a_WoR8a4rDu7L3m2lEgW2gQ9uJkZ7s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1t7a_WoR8a4rDu7L3m2lEgW2gQ9uJkZ7s" alt="Ảnh 7">
            </div>
            <div class="slide" data-index="7">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1u7b_XoR8b4rDv7M3m2lEhW2gQ9uKkZ8s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1u7b_XoR8b4rDv7M3m2lEhW2gQ9uKkZ8s" alt="Ảnh 8">
            </div>
            <div class="slide" data-index="8">
                <div class="slide-blur-bg" style="background-image: url('https://drive.google.com/uc?export=view&id=1v7c_YoR8c4rDw7N3m2lEiW2gQ9uLkZ9s');"></div>
                <img class="slide-media" data-src="https://drive.google.com/uc?export=view&id=1v7c_YoR8c4rDw7N3m2lEiW2gQ9uLkZ9s" alt="Ảnh 9">
            </div>
        </div>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const slides = Array.from(document.querySelectorAll('.slide'));
        const totalSlides = slides.length;
        
        let currentIndex = 4; // Bắt đầu ở ảnh số 5
        let isDragging = false;
        let startX = 0;
        let currentTranslate = 0;
        let autoPlayTimer = null;

        function lazyLoadImages() {
            slides.forEach(slide => {
                const img = slide.querySelector('.slide-media');
                if (img && img.getAttribute('data-src') && !img.src) {
                    img.src = img.getAttribute('data-src');
                }
            });
        }

        function updateCarousel() {
            slides.forEach((slide, i) => {
                let offset = i - currentIndex;
                
                if (offset < -totalSlides / 2) offset += totalSlides;
                if (offset > totalSlides / 2) offset -= totalSlides;

                slide.className = 'slide';

                if (offset === 0) {
                    slide.classList.add('active');
                } else if (offset === 1) {
                    slide.classList.add('next-1');
                } else if (offset === 2) {
                    slide.classList.add('next-2');
                } else if (offset === -1) {
                    slide.classList.add('prev-1');
                } else if (offset === -2) {
                    slide.classList.add('prev-2');
                } else {
                    slide.classList.add('hidden');
                }
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            updateCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            updateCarousel();
        }

        function startAutoPlay() {
            stopAutoPlay();
            autoPlayTimer = setInterval(nextSlide, 2750);
        }

        function stopAutoPlay() {
            if (autoPlayTimer) clearInterval(autoPlayTimer);
        }

        function handleStart(e) {
            stopAutoPlay();
            isDragging = true;
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        }

        function handleMove(e) {
            if (!isDragging) return;
            const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
            currentTranslate = currentX - startX;
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            if (currentTranslate < -40) nextSlide();
            else if (currentTranslate > 40) prevSlide();
            currentTranslate = 0;
            startAutoPlay();
        }

        let lastWheelTime = 0;
        function handleWheel(e) {
            e.preventDefault();
            const now = performance.now();
            if (now - lastWheelTime < 750) return;

            stopAutoPlay();
            if (e.deltaY > 0 || e.deltaX > 0) nextSlide();
            else prevSlide();
            lastWheelTime = now;
            startAutoPlay();
        }

        carousel.addEventListener('mousedown', handleStart);
        carousel.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        carousel.addEventListener('touchstart', handleStart);
        carousel.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);

        carousel.addEventListener('wheel', handleWheel, { passive: false });

        slides.forEach(slide => {
            slide.addEventListener('click', () => {
                stopAutoPlay();
                currentIndex = parseInt(slide.getAttribute('data-index'));
                updateCarousel();
                startAutoPlay();
            });
        });

        lazyLoadImages();
        updateCarousel();
        startAutoPlay();
    </script>
</body>
</html>
